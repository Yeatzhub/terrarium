# Jupiter DEX Trading Bot Configuration
# Paper trading mode is ENABLED by default - no real money at risk

# =============================================================================
# Trading Mode Settings
# =============================================================================
trading:
  mode: "paper"  # Options: "paper" (default), "live"
  
  # Live trading approval - requires manual confirmation for first trade
  live_approval_required: true
  
  # Risk per trade (% of portfolio)
  risk_per_trade: 1.5
  
  # Maximum positions open simultaneously
  max_positions: 5
  
  # Portfolio percentage limit per position
  max_position_pct: 15.0
  
  # Minimum trade value in USD (to ensure gas costs are reasonable)
  min_trade_value: 100.0
  
  # Maximum daily loss percentage (circuit breaker)
  max_daily_loss_pct: 5.0

# =============================================================================
# Jupiter DEX Settings
# =============================================================================
jupiter:
  # Jupiter API endpoints
  api_base_url: "https://quote-api.jup.ag/v6"
  swap_api_url: "https://quote-api.jup.ag/v6/swap"
  
  # RPC endpoints (prioritize paid endpoints for production)
  rpc_urls:
    priority: "https://api.mainnet-beta.solana.com"
    fallback: "https://solana-rpc.publicnode.com"
  
  # Platform fee in basis points (Jupiter takes 0.05%)
  platform_fee_bps: 5
  
  # Referral account (optional, for fee rebates)
  referral_account: null
  
  # Preferred DEX route preferences (in order)
  preferred_routes:
    - "Raydium"
    - "Orca"
    - "Meteora"
    - "Crema"
    - "Lifinity"

# =============================================================================
# Solana Network Settings
# =============================================================================
solana:
  # Network: mainnet-beta, devnet, or testnet
  network: "mainnet-beta"
  
  # Priority fee settings
  priority_fee:
    enabled: true
    base_micro_lamports: 10000  # 0.001 SOL base
    congestion_multiplier: 1.5  # Multiplier during network congestion
  
  # Compute unit budget
  compute_units: 300000
  
  # Gas price tracker (for estimating costs)
  track_gas_prices: true
  
  # Network health check settings
  health_check:
    min_tps: 1500
    max_slot_time_ms: 500
    check_interval_seconds: 30

# =============================================================================
# Strategy Configuration
# =============================================================================
strategy:
  name: "JupiterTrendFollowing_v1"
  
  # Timeframes for multi-timeframe analysis
  timeframes:
    primary: "5m"    # Entry/exit timing
    secondary: "1h"  # Trend confirmation
    tertiary: "4h"   # Major trend
  
  # Entry score threshold (must be >= 75)
  entry_score_threshold: 75
  
  # Market regime detection
  regime_detection:
    adx_trending: 30
    adx_ranging: 20
    atr_percentile_low: 30
    atr_percentile_high: 70
    min_relative_volume: 1.5
  
  # Score weights for entry conditions
  score_weights:
    price_above_vwap: 25
    adx_confirmed: 20
    trend_aligned: 15
    volume_spike: 10
    price_above_sma: 10
    momentum_healthy: 10
    whale_inflow: 10

# =============================================================================
# Entry/Exit Settings
# =============================================================================
trade_management:
  # Take profit levels (percentage from entry)
  take_profit:
    tp1: 5.0    # Close 25% of position
    tp2: 10.0   # Close 35% of position
    tp3: 18.0   # Close 25% of position
    tp4: 30.0   # Runner (15%)
  
  # Position close percentages at each TP
  tp_close_pct:
    tp1: 0.25
    tp2: 0.35
    tp3: 0.25
    tp4: 0.15
  
  # Stop loss settings
  stop_loss:
    atr_multiplier: 2.5      # Base ATR multiplier
    meme_multiplier: 1.5     # Additional multiplier for meme tokens
    major_multiplier: 0.8      # Reduced multiplier for major tokens
    hard_stop_pct: 8.0        # Maximum 8% loss
  
  # Trailing stop settings
  trailing_stop:
    enabled: true
    activation_pct: 3.0      # Activate after 3% profit
    atr_multiplier: 3.0      # Trail distance
  
  # Time-based exits
  time_decay:
    scalp_hours: 8
    swing_hours: 72
    trend_hours: 168

# =============================================================================
# Kelly Criterion Settings
# =============================================================================
kelly:
  enabled: true
  fraction: 0.25              # Use 1/4 Kelly for safety
  min_history_trades: 20      # Minimum trades for reliable calculation
  max_position_pct: 20.0      # Cap Kelly at 20% of portfolio

# =============================================================================
# Slippage Management
# =============================================================================
slippage:
  # Base slippage in basis points
  base_bps: 50               # 0.5%
  
  # Dynamic slippage adjustments
  high_volatility_bps: 100   # +1% during high volatility
  large_order_bps: 50        # +0.5% for orders > $25k
  
  # Maximum acceptable slippage
  max_bps: 300               # 3% absolute max
  
  # Pre-trade slippage test
  test_slippage_before_trade: true
  test_amount_usd: 10000      # Test with $10k swap

# =============================================================================
# MEV Protection
# =============================================================================
mev_protection:
  enabled: true
  
  # Random delay before execution (milliseconds)
  min_delay_ms: 500
  max_delay_ms: 3000
  
  # Transaction privacy settings
  use_private_mempool: false   # Requires Jito or similar
  
  # Maximum order split size for large orders
  max_chunk_size_usd: 25000
  
  # Minimum blocks between trades from same wallet
  cooldown_blocks: 2

# =============================================================================
# Token Screening
# =============================================================================
token_screening:
  enabled: true
  
  # Minimum requirements
  min_market_cap: 10000000      # $10M minimum
  min_24h_volume: 1000000        # $1M daily
  min_jupiter_liquidity: 500000  # $500k in Jupiter pools
  max_slippage_10k: 0.01        # 1% slippage on $10k swap
  min_holder_count: 1000        # Decent distribution
  min_pool_count: 3             # Multiple DEX routes
  max_single_pool_pct: 0.80     # No pool >80% of liquidity
  
  # Risk tiers
  tiers:
    AAA:  # Top tier
      max_position_pct: 25.0
      slippage_bps: 30
      allowed: true
    AA:
      max_position_pct: 15.0
      slippage_bps: 50
      allowed: true
    A:
      max_position_pct: 10.0
      slippage_bps: 100
      allowed: true
    B:
      max_position_pct: 5.0
      slippage_bps: 200
      allowed: true
    C:
      max_position_pct: 2.0
      slippage_bps: 300
      allowed: true
    REJECT:
      allowed: false

# =============================================================================
# Core Token Watchlist
# =============================================================================
watchlist:
  # Always track these tokens
  core_tokens:
    - "So11111111111111111111111111111111111111112"  # SOL
    - "JUPyiwrYJFskUPiHa7hKeRBo7f49nerZuhM5ZsKVFtc"  # JUP
    - "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"  # USDC
    - "DezXAZ8z7PnrnRJjz3wXBoRgixCa6xjnB7YaB1pPB263"  # BONK
  
  # Refresh trending tokens
  refresh_trending: true
  trending_limit: 50
  refresh_interval_minutes: 60

# =============================================================================
# Trading Schedule
# =============================================================================
trading_schedule:
  enabled: false  # Set to true to restrict trading hours
  
  # UTC hours (0-23)
  allowed_windows:
    asian_morning: false     # 00:00-04:00 UTC
    asian_afternoon: true   # 04:00-08:00 UTC
    european_morning: true  # 08:00-12:00 UTC
    us_morning: true        # 13:00-17:00 UTC  (high priority)
    us_afternoon: true      # 17:00-21:00 UTC  (high priority)
    late_night: true        # 21:00-24:00 UTC
  
  # Weekend trading
  trade_weekends: true
  weekend_size_multiplier: 0.5  # Reduce position sizes

# =============================================================================
# Logging & Monitoring
# =============================================================================
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  
  # Trade log file
  trade_log_file: "trades.jsonl"
  trade_log_rotate_days: 7
  
  # Performance metrics file
  metrics_file: "metrics.json"
  
  # Alert destinations
  alerts:
    telegram:
      enabled: false
      bot_token: null
      chat_id: null
    discord:
      enabled: false
      webhook_url: null
  
  # Summary report frequency
  summary_interval_hours: 24

# =============================================================================
# Database Settings (for trade logging)
# =============================================================================
database:
  enabled: false  # Enable for persistent storage
  
  # PostgreSQL settings
  postgres:
    host: "localhost"
    port: 5432
    database: "jupiter_bot"
    user: "bot_user"
    password: null  # Set via environment variable
    min_pool_size: 2
    max_pool_size: 10
  
  # Redis settings (for caching)
  redis:
    host: "localhost"
    port: 6379
    db: 0
    max_connections: 50

# =============================================================================
# Circuit Breakers
# =============================================================================
circuit_breakers:
  daily_loss:
    enabled: true
    threshold_pct: 5.0
  
  drawdown:
    enabled: true
    threshold_pct: 15.0
  
  network_degradation:
    enabled: true
    halt_on_low_tps: true
    halt_on_high_volatility: true
  
  correlation_spike:
    enabled: true
    threshold: 0.80

# =============================================================================
# Wallet Settings (for live trading)
# =============================================================================
# WARNING: Only configure if mode is "live"
# Store private key securely in environment variable
wallet:
  # Public address for monitoring
  public_key: null
  
  # Private key from environment variable
  private_key_env: "JUPITER_BOT_PRIVATE_KEY"
  
  # Minimum SOL balance to keep for gas
  min_sol_balance: 0.1
  
  # Auto-refuel settings
  auto_refuel:
    enabled: false
    target_sol_balance: 0.5
    refuel_threshold: 0.05

# =============================================================================
# Backtest Settings (for paper trading validation)
# =============================================================================
backtest:
  initial_capital: 10000
  
  # Fee simulation
  jupiter_fee_bps: 5
  network_fee_sol: 0.001
  
  # Execution model
  fill_model: "probabilistic"  # or "immediate"
  slippage_model: "dynamic"    # or "fixed"
  
  # Risk limits
  max_drawdown_pct: 15
  daily_loss_limit_pct: 5
