<!DOCTYPE html>
<html>
<head>
  <title>WS Test</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #eee; padding: 20px; }
    #log { background: #16213e; padding: 10px; border-radius: 5px; height: 400px; overflow-y: auto; }
    .success { color: #4ecca3; }
    .error { color: #e94560; }
    button { padding: 10px; margin: 5px; cursor: pointer; font-size: 14px; }
  </style>
</head>
<body>
  <h2>OpenClaw WebSocket Test</h2>
  <div>
    <button onclick="testCombinations()">Test All Combinations</button>
    <button onclick="clearLog()">Clear</button>
  </div>
  <div id="log"></div>

  <script>
    const log = document.getElementById('log');
    
    function addLog(msg, type) {
      const div = document.createElement('div');
      div.className = type || '';
      div.textContent = new Date().toLocaleTimeString() + ' ' + msg;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }
    
    function clearLog() { log.innerHTML = ''; }
    
    const ids = ['web', 'browser', 'openclaw', 'gateway', 'app', 'mission-control'];
    const modes = ['app', 'web', 'operator', 'client', 'user'];
    const platforms = ['browser', 'web', 'desktop'];
    
    let currentTest = 0;
    const results = [];
    
    function testOne(id, mode, platform) {
      return new Promise((resolve) => {
        const ws = new WebSocket('ws://127.0.0.1:18789');
        let resolved = false;
        
        ws.onopen = () => {
          ws.send(JSON.stringify({
            type: 'req',
            id: 'test',
            method: 'connect',
            params: {
              minProtocol: 3,
              maxProtocol: 3,
              client: { id, version: '1.0.0', platform, mode },
              locale: 'en-US',
              userAgent: navigator.userAgent
            }
          }));
        };
        
        ws.onmessage = (e) => {
          const msg = JSON.parse(e.data);
          if (msg.type === 'res' && msg.id === 'test') {
            resolved = true;
            ws.close();
            if (msg.ok) {
              addLog(>>SUCCESS: id="${id}", mode="${mode}", platform="${platform}">, 'success');
              results.push({id, mode, platform, ok: true});
            } else {
              addLog(>FAIL: id="${id}", mode="${mode}", platform="${platform}": ${msg.error?.message}, 'error');
              results.push({id, mode, platform, ok: false, error: msg.error?.message});
            }
            resolve();
          }
        };
        
        ws.onerror = () => {
          if (!resolved) {
            resolved = true;
            addLog(>ERROR: id="${id}", mode="${mode}", platform="${platform}", 'error');
            resolve();
          }
        };
        
        ws.onclose = () => {
          if (!resolved) {
            resolved = true;
            resolve();
          }
        };
        
        setTimeout(() => {
          if (!resolved) {
            resolved = true;
            ws.close();
            addLog(>TIMEOUT: id="${id}", mode="${mode}", platform="${platform}", 'error');
            resolve();
          }
        }, 5000);
      });
    }
    
    async function testCombinations() {
      clearLog();
      addLog('Starting tests...');
      
      for (const id of ids) {
        for (const mode of modes) {
          for (const platform of platforms) {
            await testOne(id, mode, platform);
            await new Promise(r => setTimeout(r, 500));
          }
        }
      }
      
      const success = results.filter(r => r.ok);
      addLog('');
      addLog('=== RESULTS ===');
      if (success.length > 0) {
        addLog(>Working combination found!, 'success');
        success.forEach(s => {
          addLog(>  id="${s.id}", mode="${s.mode}", platform="${s.platform}">, 'success');
        });
      } else {
        addLog(>No working combinations found, 'error');
      }
    }
  </script>
</body>
</html>
